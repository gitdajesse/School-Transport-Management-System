<!DOCTYPE html>
<html lang = "en">
    <head>
        <title>
            {% block title %}
                My Django App
            {% endblock %}
        </title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    </head>
    <body>
        <!-- Display messages -->
        <div>
            {% if messages %}
                <div class="messages">
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
        </div>

        <div class = "container">
            <nav class = "links">
                <a href = "{% url 'index' %}">
                    Home
                </a>
                {% if user.is_authenticated %}
                    <span>
                        Welcome, {{ user.username }}
                    </span>
                    <a href = "{% url 'logout' %}">
                        Logout
                    </a>
                {% else %}
                    <a href = "{% url 'login' %}">
                        Login
                    </a>
                    <a href = "{% url 'register' %}">
                        Register
                    </a>
                {% endif %}
            </nav>

            {% block body %}
            {% endblock %}
        </div>
    </body>
</html>
